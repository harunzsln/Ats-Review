project_id = "ats-review"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[storage]
enabled = true
file_size_limit = "10MiB"

# Private bucket for CV PDFs — access ONLY via short-lived signed URLs (KVKK §4.5).
[storage.buckets.cv-files]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = true

[functions.auto-anonymize]
verify_jwt = false
